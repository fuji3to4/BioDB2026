services:
  postgres:
    build: ./docker/postgres
    container_name: biodb2026-postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./SQL:/home/user/SQL
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    restart: always

  php:
    build: ./docker/php
    container_name: biodb2026-php
    ports:
      - "80:80"
    volumes:
      - ./html:/html
    depends_on:
      - postgres
    restart: always

volumes:
  pgdata:
