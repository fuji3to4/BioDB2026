services:
  postgres:
    build: ./docker/postgres
    container_name: biodb2026-postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./SQL:/home/user/SQL
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    restart: always

volumes:
  pgdata:
