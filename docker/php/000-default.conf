<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # 演習用: ログ出力を無効化（WSL2 VHDXの肥大化・断片化を防止）
    ErrorLog /dev/null
    CustomLog /dev/null combined
</VirtualHost>
